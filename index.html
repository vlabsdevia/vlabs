<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Sweet 16, Maia!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #FF6B9D;
      --pink-light: #FF9EC6;
      --gold: #FFD700;
      --gold-dark: #DAA520;
      --purple: #9B59B6;
      --purple-light: #C39BD3;
      --bg: #0D0D1A;
      --bg-card: #1A1A2E;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── CONFETTI ── */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      top: -20px;
      opacity: 0.8;
      animation: confettiFall linear infinite;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ── SPARKLE BG ── */
    .sparkle-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(255, 107, 157, 0.08), transparent),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(155, 89, 182, 0.08), transparent),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(255, 215, 0, 0.04), transparent);
    }

    /* ── MAIN ── */
    .page {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      text-align: center;
    }

    /* ── CROWN ── */
    .crown {
      margin-bottom: 20px;
      animation: crownBounce 2s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
    }

    @keyframes crownBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* ── AGE BADGE ── */
    .age-badge {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      box-shadow:
        0 0 60px rgba(255, 107, 157, 0.3),
        0 0 120px rgba(155, 89, 182, 0.15),
        inset 0 0 30px rgba(255, 255, 255, 0.1);
      animation: badgePulse 3s ease-in-out infinite;
      position: relative;
    }

    .age-badge::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      opacity: 0.5;
      animation: spinSlow 8s linear infinite;
    }

    .age-badge::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px dashed var(--gold);
      opacity: 0.25;
      animation: spinSlow 12s linear infinite reverse;
    }

    @keyframes badgePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .age-num {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      line-height: 1;
    }

    /* ── TEXT ── */
    .sweet-label {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(28px, 5vw, 42px);
      color: var(--gold);
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.3s;
    }

    .main-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 8vw, 80px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    .main-title .name {
      background: linear-gradient(135deg, var(--pink), var(--pink-light), var(--gold), var(--purple-light));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(20px, 3.5vw, 32px);
      color: var(--pink-light);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.7s;
    }

    .message {
      font-size: 16px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.6);
      max-width: 500px;
      line-height: 1.8;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.9s;
    }

    /* ── SPARKLE DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.85s;
    }

    .divider-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .divider-star {
      color: var(--gold);
      font-size: 14px;
      animation: twinkle 2s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── HEARTS FLOAT ── */
    .hearts {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 1;
    }

    .heart {
      position: absolute;
      bottom: -40px;
      font-size: 20px;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
    }

    /* ── WISH BUTTON ── */
    .wish-btn {
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 16px 48px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.1s;
      box-shadow: 0 4px 30px rgba(255, 107, 157, 0.3);
    }

    .wish-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(255, 107, 157, 0.5);
    }

    .wish-btn:active { transform: scale(0.97); }

    /* ── BURST ── */
    .burst {
      position: fixed;
      pointer-events: none;
      z-index: 100;
    }

    .burst-particle {
      position: absolute;
      border-radius: 50%;
      animation: burstOut 0.8s ease-out forwards;
    }

    @keyframes burstOut {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── FOOTER ── */
    .footer-note {
      margin-top: 60px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 1px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.3s;
    }
  </style>
</head>
<body>

<div class="sparkle-bg"></div>
<div class="confetti-container" id="confetti"></div>
<div class="hearts" id="hearts"></div>

<div class="page">

  <!-- Crown SVG -->
  <div class="crown">
    <svg width="80" height="52" viewBox="0 0 80 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 44L14 12L28 32L40 4L52 32L66 12L76 44H4Z" fill="url(#crownGrad)" stroke="#FFD700" stroke-width="2"/>
      <circle cx="14" cy="10" r="4" fill="#FFD700"/>
      <circle cx="40" cy="2" r="4" fill="#FFD700"/>
      <circle cx="66" cy="10" r="4" fill="#FFD700"/>
      <rect x="4" y="44" width="72" height="6" rx="2" fill="url(#crownGrad)" stroke="#DAA520" stroke-width="1"/>
      <defs>
        <linearGradient id="crownGrad" x1="0" y1="0" x2="80" y2="52">
          <stop offset="0%" stop-color="#FFD700"/>
          <stop offset="50%" stop-color="#FFC107"/>
          <stop offset="100%" stop-color="#DAA520"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- Age Badge -->
  <div class="age-badge">
    <span class="age-num">16</span>
  </div>

  <!-- Text -->
  <div class="sweet-label">Happy Sweet</div>
  <h1 class="main-title">Happy Birthday, <span class="name">Maia</span>!</h1>
  <div class="subtitle">Welcome to your Sweet 16</div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-star">&#10022;</span>
    <span class="divider-star" style="animation-delay: 0.3s;">&#10022;</span>
    <span class="divider-star" style="animation-delay: 0.6s;">&#10022;</span>
    <div class="divider-line"></div>
  </div>

  <p class="message">
    Sixteen looks amazing on you! Here's to new adventures, unforgettable memories, and a year as bright and beautiful as you are.
  </p>

  <button class="wish-btn" onclick="launchCelebration(this)">Send a Wish</button>

  <div class="footer-note">Made with love for Maia</div>

</div>

<script>
  // ── Confetti ──
  function createConfetti() {
    const container = document.getElementById('confetti');
    const colors = ['#FF6B9D', '#FFD700', '#9B59B6', '#FF9EC6', '#C39BD3', '#FFC107', '#FF85B3'];
    const shapes = ['circle', 'square'];

    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.classList.add('confetti');
      const size = Math.random() * 8 + 4;
      const isCircle = shapes[Math.floor(Math.random() * shapes.length)] === 'circle';
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.borderRadius = isCircle ? '50%' : '2px';
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (Math.random() * 4 + 4) + 's';
      el.style.animationDelay = (Math.random() * 6) + 's';
      container.appendChild(el);
    }
  }

  // ── Floating Hearts ──
  function createHearts() {
    const container = document.getElementById('hearts');
    const heartChars = ['\u2665', '\u2764', '\u2661'];

    setInterval(() => {
      const h = document.createElement('div');
      h.classList.add('heart');
      h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
      h.style.left = Math.random() * 100 + '%';
      h.style.fontSize = (Math.random() * 16 + 12) + 'px';
      h.style.color = Math.random() > 0.5 ? '#FF6B9D' : '#FF9EC6';
      h.style.animationDuration = (Math.random() * 4 + 6) + 's';
      container.appendChild(h);
      setTimeout(() => h.remove(), 10000);
    }, 800);
  }

  // ── Burst on Click ──
  function launchCelebration(btn) {
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const colors = ['#FF6B9D', '#FFD700', '#9B59B6', '#FF9EC6', '#FFC107'];

    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.classList.add('burst-particle');
      const size = Math.random() * 8 + 4;
      const angle = (Math.PI * 2 * i) / 30;
      const dist = Math.random() * 120 + 60;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.borderRadius = '50%';
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      p.style.position = 'fixed';
      p.style.pointerEvents = 'none';
      p.style.zIndex = '200';
      p.style.animation = 'none';
      document.body.appendChild(p);

      p.animate([
        { transform: 'translate(0,0) scale(1)', opacity: 1 },
        { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
      ], { duration: 700, easing: 'ease-out', fill: 'forwards' });

      setTimeout(() => p.remove(), 800);
    }

    btn.textContent = 'Wish Sent!';
    btn.style.background = 'linear-gradient(135deg, #FFD700, #DAA520)';
    setTimeout(() => {
      btn.textContent = 'Send a Wish';
      btn.style.background = 'linear-gradient(135deg, #FF6B9D, #9B59B6)';
    }, 2000);
  }

  createConfetti();
  createHearts();
</script>

</body>
</html>
